<div class="w-full min-h-[75vh] flex flex-col gap-3">
  <div class="flex flex-col gap-3">
    <!-- Success Icon -->
    <div
      class="grid h-[40px] w-[40px] place-content-center rounded-xl border border-success-muted bg-success-soft text-success-strong p-[14px]"
    >
      <i class="icon-check-circle text-xl"></i>
    </div>

    <h1 class="text-3xl font-semibold text-foreground">
      {{ 'auth.verification.title' | translate }}
    </h1>
    <p class="text-muted">{{ 'auth.verification.subtitle' | translate }}</p>

    <div class="text-sm text-muted">
      <app-reset-button
        [title]="'auth.verification.didntReceiveEmail' | translate"
        [buttonLabel]="'auth.verification.clickToResend' | translate"
        [isLoading]="isButtonLoading()"
        [successToken]="resendSuccessToken"
        (resend)="resendVerificationEmail()"
      />
    </div>
  </div>

  <p-button
    class="flex w-full mt-auto"
    [label]="'auth.verifyEmail.backToLogin' | translate"
    fluid
    severity="primary"
    (click)="onBackToLogin()"
  ></p-button>
</div>
