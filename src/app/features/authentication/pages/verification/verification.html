<div class="w-full min-h-[75vh] flex flex-col gap-3">
  <div class="flex flex-col gap-3">
    <!-- Success Icon -->
    <div
      class="p-[14px] w-[40px] h-[40px] rounded-xl bg-(--p-bg-warning-primary) flex border border-(--p-border-strong) items-center justify-center"
    >
      <i class="icon-check-circle text-(--p-text-secondary) text-xl"></i>
    </div>

    <h1 class="text-3xl font-semibold text-(--p-text-primary)">
      {{ 'auth.verification.title' | translate }}
    </h1>
    <p class="text-(--p-text-tertiary)">{{ 'auth.verification.subtitle' | translate }}</p>

    <div class="text-sm text-(--p-text-secondary)">
      <app-reset-button
        [title]="'auth.verification.didntReceiveEmail' | translate"
        [buttonLabel]="'auth.verification.clickToResend' | translate"
        [isLoading]="isButtonLoading()"
        [successToken]="resendSuccessToken"
        (resend)="resendVerificationEmail()"
      />
    </div>
  </div>

  <p-button
    class="flex w-full mt-auto"
    [label]="'auth.verifyEmail.backToLogin' | translate"
    fluid
    severity="primary"
    (click)="onBackToLogin()"
  ></p-button>
</div>
