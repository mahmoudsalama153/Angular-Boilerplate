<div class="w-full">
  <!-- Loading Indicator -->
  @if (authStore.loading()) {
    <div class="flex flex-col items-center justify-center gap-4 min-h-[400px]">
      <p-progressSpinner styleClass="w-12 h-12" strokeWidth="4"></p-progressSpinner>
      <p class="text-(--p-text-tertiary)">{{ 'auth.verifyEmail.verifying' | translate }}</p>
    </div>
  }

  <!-- Content (shown after successful verification) -->
  @if (!authStore.loading() && verified()) {
    <div class="flex flex-col gap-3">
      <!-- Success Icon -->
      <div
        class="w-[40px] h-[40px] rounded-xl bg-(--p-bg-warning-primary) flex border border-(--p-border-subtle) items-center justify-center"
      >
        <i class="icon-check-circle text-(--p-text-primary) text-xl"></i>
      </div>

      <h1 class="text-3xl font-semibold text-(--p-text-primary)">
        {{ 'auth.verifyEmail.title' | translate }}
      </h1>
      <p class="text-(--p-text-tertiary) max-w-md">{{ 'auth.verifyEmail.subtitle' | translate }}</p>
    </div>

    <p-button
      class="flex w-full mt-4"
      [label]="'auth.verifyEmail.backToLogin' | translate"
      fluid
      severity="primary"
      (onClick)="onBackToLogin()"
    ></p-button>
  }
</div>
