<div class="w-full">
  <!-- Loading Indicator -->
  @if (authStore.loading()) {
    <div class="flex flex-col items-center justify-center gap-4 min-h-[400px]">
      <p-progressSpinner styleClass="w-12 h-12" strokeWidth="4"></p-progressSpinner>
      <p class="text-muted">{{ 'auth.verifyEmail.verifying' | translate }}</p>
    </div>
  }

  <!-- Content (shown after successful verification) -->
  @if (!authStore.loading() && verified()) {
    <div class="flex flex-col gap-3">
      <!-- Success Icon -->
      <div
        class="grid h-[40px] w-[40px] place-content-center rounded-xl border border-success-muted bg-success-soft text-success-strong"
      >
        <i class="icon-check-circle text-xl"></i>
      </div>

      <h1 class="text-3xl font-semibold text-foreground">
        {{ 'auth.verifyEmail.title' | translate }}
      </h1>
      <p class="max-w-md text-muted">{{ 'auth.verifyEmail.subtitle' | translate }}</p>
    </div>

    <p-button
      class="flex w-full mt-4"
      [label]="'auth.verifyEmail.backToLogin' | translate"
      fluid
      severity="primary"
      (onClick)="onBackToLogin()"
    ></p-button>
  }
</div>
