<div class="cards-page-layout px-[32px] py-[24px]">
  <app-table-layout
    [tableTitle]="'Dashboard'"
    [tableSubTitle]="'Dashboard'"
    pageTitleClass="text-[24px] font-semibold"
    pageSubTitleClass="text-md text-gray-600"
  >
    <ng-container ngProjectAs="table-filters">
      <app-dashboard-filter></app-dashboard-filter>
    </ng-container>

    <ng-container ngProjectAs="table-body">
      <app-table-skeleton [headers]="headers()" [isLoading]="isLoading()">
        <app-data-table
          [columns]="headers()"
          [rows]="rows()"
          [(filter)]="filterService.filter"
          [totalRecords]="rows().length"
          (filterChange)="filterService.applyFilterWithPaging()"
          (sortChange)="applyFilter()"
          [messageTitle]="'No data found'"
          [showCheckBox]="false"
          [rowsCheckable]="false"
        >
          <ng-template #itemsTemplate let-item="item">
            <td>{{ item.id }}</td>
            <td>{{ item.name }}</td>
            <td>{{ item.title }}</td>
            <td>{{ item.type }}</td>
            <td>{{ item.joinDate | localizedDate }}</td>
            <td>{{ item.assignedEmployee }}</td>
            <td>
              <app-base-tag
                [value]="getStatusLabelKey(item.status)"
                [color]="getStatusBadgeClass(item.status)"
                [maxChars]="27"
              ></app-base-tag>
            </td>
            <td>
              <app-dashboard-actions-menu [actions]="item.actions" [element]="item" />
            </td>
          </ng-template> </app-data-table
      ></app-table-skeleton>
    </ng-container>
  </app-table-layout>
</div>
