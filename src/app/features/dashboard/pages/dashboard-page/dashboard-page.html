<div class="cards-page-layout px-[32px] py-[24px]">
  <app-table-layout
    [tableTitle]="'Dashboard'"
    [tableSubTitle]="'Dashboard'"
    pageTitleClass="text-[24px] font-semibold"
    pageSubTitleClass="text-md text-gray-600"
  >

    <!-- Statistics Cards -->
    <ng-container ngProjectAs="table-filters">
      <div class="w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-6">

      </div>
    </ng-container>

    <ng-container ngProjectAs="table-body">
      <app-table-skeleton
        [headers]="headers()"
        [isLoading]="isLoading()"
      >
        <app-data-table
          [columns]="headers()"
          [rows]="rows()"
          [(filter)]="filterService.filter"
          [totalRecords]="totalRecords()"
          (filterChange)="filterService.applyFilterWithPaging()"
          (sortChange)="applyFilter()"
          [messageTitle]="'No data found'"
          [showCheckBox]="false"
          [rowsCheckable]="false"
        >
          <ng-template
            #itemsTemplate
            let-item="item"
          >
            <td>{{ item.name }}</td>
            <td>{{ item.email }}</td>
            <td>{{ item.joinDate }}</td>
            <td>
              <button
                pButton
                type="button"
                icon="pi pi-eye"
              ></button>
            </td>
          </ng-template>
        </app-data-table></app-table-skeleton>
    </ng-container>
  </app-table-layout>
</div>
