<app-base-dialog
  [(visible)]="visible"
  icon="icon-check-circle"
  [dialogTitle]="title()"
  [confirmLabel]="submitLabel()"
  [cancelLabel]="backLabel()"
  [isLoading]="isLoading()"
  [confirmButtonClass]="'w-auto min-w-[140px]'"
  [cancelButtonClass]="'w-auto min-w-[88px]'"
  [styleClass]="'!p-0 max-w-[40rem]'"
  [contentStyleClass]="'!p-0'"
  (onConfirm)="handleSubmit()"
  (onCancel)="handleBack()"
  (onClose)="handleClose()"
>
  <ng-container ngProjectAs="subTitle">
    <p class="mt-[2px] text-sm text-tertiary leading-5">
      {{ description() }}
    </p>
  </ng-container>

  <div class="px-[24px] pb-[20px]">
    <form
      class="mt-[20px] flex flex-col gap-[20px]"
      [formGroup]="form"
    >
      <div class="grid grid-cols-1 md:grid-cols-2 gap-[16px]">
        <div>
          <app-base-label
            [title]="'Name'"
            [required]="true"
          />
          <input
            pInputText
            formControlName="name"
            class="w-full"
            placeholder="Enter Name"
          />
          <app-form-input-error-messages [control]="form.controls.name" />
        </div>

        <div>
          <app-base-label
            [title]="'Job Title'"
            [required]="true"
          />
          <input
            pInputText
            formControlName="jobTitle"
            class="w-full"
            placeholder="Enter Job title"
          />
          <app-form-input-error-messages [control]="form.controls.jobTitle" />
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-[16px]">
        <div>
          <app-base-label
            [title]="'Contact number'"
            [required]="true"
          />
          <input
            pInputText
            formControlName="contactNumber"
            class="w-full"
            placeholder="Enter Contact number"
          />
          <app-form-input-error-messages [control]="form.controls.contactNumber" />
        </div>

        <div>
          <app-base-label
            [title]="'Email ID'"
            [required]="true"
          />
          <input
            pInputText
            formControlName="email"
            class="w-full"
            placeholder="Enter Email ID"
          />
          <app-form-input-error-messages [control]="form.controls.email" />
        </div>
      </div>

      <div>
        <app-signature-pad
          [existingSignature]="existingSignature()"
          (onSignatureChange)="onSignatureChange($event)"
        />
        <app-form-input-error-messages [control]="form.controls.signature" />
      </div>
    </form>
  </div>
</app-base-dialog>
