<div class="flex flex-col items-center">
  <span
    class="mb-[20px] grid h-[48px] w-[48px] place-content-center rounded-full bg-accent text-accent-foreground {{
      iconClass()
    }}"
  >
    <i class="{{ icon() }} text-primary"></i>
  </span>
  <p class="mb-[8px] text-lg font-bold text-foreground {{ titleClass() }}">{{ messageTitle() }}</p>
  <p class="mb-[32px] text-center text-sm text-muted {{ subTitleClass() }}">
    {{ subtitle() }}
  </p>
  <ng-content></ng-content>
</div>
