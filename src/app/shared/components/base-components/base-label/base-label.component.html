<!-- eslint-disable @angular-eslint/template/label-has-associated-control -->
<label
  class="font-medium capitalize mb-[6px] inline-block text-(--p-text-secondary) {{ styleClass() }}"
>
  {{ title() }}
  @if (secondaryTitle()) {
    <span class="ms-1 !font-normal">{{ secondaryTitle() }}</span>
  }
  @if (required()) {
    <span class="text-(--p-text-error-primary-hover)"> *</span>
  }
  @if (helpTooltip()) {
    <span
      ><i
        class="icon-help-circle text-sm ms-1"
        [pTooltip]="helpTooltip()"
        tooltipPosition="top"
        [tooltipStyleClass]="'!max-w-[90%] !w-auto'"
      ></i
    ></span>
  }
</label>
