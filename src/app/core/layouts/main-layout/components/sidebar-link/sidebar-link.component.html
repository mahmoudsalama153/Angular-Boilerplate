@if (link().external) {
  <a
    [href]="link().routerLink"
    target="_blank"
    class="group items-center hover:bg-brand-solid-hover text-[16px] transition-all duration-300 ease-in-out block w-full p-3 rounded-lg font-semibold p-[12px]"
    [class.justify-center]="collapsed()"
  >
    <i
      class="{{
        link().icon
      }} group-[.bg-primary]:text-white text-2xl! w-[25px] shrink-0 transition-[margin] duration-300 ease-in-out"
      [class.me-[11px]]="!collapsed()"
    ></i>
    @if (!collapsed()) {
      <span>{{ link().label }}</span>
    }
  </a>
} @else {
  <a
    [routerLink]="link().routerLink"
    routerLinkActive="bg-brand-solid text-primary-on-brand"
    class="group items-center hover:bg-brand-solid-hover text-[16px] transition-all duration-300 ease-in-out block w-full p-3 rounded-lg font-semibold p-[12px]"
    [class.justify-center]="collapsed()"
  >
    <i
      class="{{
        link().icon
      }} group-[.bg-primary]:text-white text-2xl! w-[25px] shrink-0 transition-[margin] duration-300 ease-in-out"
      [class.me-[11px]]="!collapsed()"
    ></i>
    @if (!collapsed()) {
      <span>{{ link().label }}</span>
    }
  </a>
}
