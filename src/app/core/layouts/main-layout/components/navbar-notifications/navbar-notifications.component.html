<div
  (click)="toggleNotificationTab($event)"
  [class.hidden-notification-counter]="!unreadCount()"
  class="cursor-pointer bg-surface rounded-full p-2"
>
  <p-overlaybadge [value]="unreadCount()" severity="danger" class="notification-badge">
    <app-prime-icons class="text-2xl" icon="bell"></app-prime-icons>
  </p-overlaybadge>
</div>

<p-popover
  #notificationsModal
  (onShow)="loadNotifications(); onPopoverShow()"
  (onHide)="onPopoverHide()"
  appendTo="body"
>
  <div class="flex flex-col">
    <div class="flex justify-between py-[20px] px-[24px]">
      <div class="flex justify-between items-center w-full">
        <p class="font-semibold">Notifications</p>
        <a
          class="flex items-center gap-2 text-(--p-text-brand-secondary-hover) cursor-pointer"
          (click)="markAllAsRead()"
        >
          <svg
            width="15"
            height="8"
            viewBox="0 0 15 8"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M9.75 0.75L3.75 6.75L0.75 3.75M13.75 0.75L7.75 6.75L5.75 4.75"
              stroke="text-(--p-text-brand-secondary-hover)"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          Mark all as read
        </a>
      </div>
      <span
        class="text-(--p-text-subtle-soft) text-xl cursor-pointer"
        (click)="notificationsModal.toggle($event)"
        ><i class="icon-close"></i
      ></span>
    </div>
    <div
      class="max-h-[500px] max-w-[35rem]! md:min-w-[35rem] overflow-auto border-t border-(--p-border-subtle)"
      (scroll)="onScroll($event)"
    >
      <app-navbar-notifications-tabs
        [notifications]="notifications()"
        [loading]="isLoading()"
        (notificationClick)="onNotificationClick($event)"
      ></app-navbar-notifications-tabs>

      @if (!isShowPreviousButtonClicked() && totalCount() > (notifications().length || 0)) {
        <div class="p-4 text-center w-full transition-opacity">
          <button
            pButton
            type="button"
            class="p-button-text w-full text-sm"
            (click)="loadPreviousNotifications()"
          >
            Previous notifications
          </button>
        </div>
      }
    </div>
  </div>
</p-popover>
